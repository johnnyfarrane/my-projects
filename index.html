<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny El Farrane</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo-text">Johnny El Farrane</h1>
        </div>
    </header>

    <main class="container">
        <section class="projects">
            <div class="section-title">
                <h2>Projects</h2>
                <div class="underline"></div>
            </div>
            
            <div class="projects-grid">
                <div class="project-card">
                    <div class="project-img">
                        <img src="photos/outfit1.jpg" alt="JF brand">
                    </div>
                    <div class="project-info">
                        <h3>JF brand</h3>
                        <p>Premium branding.</p>
                        <a href="https://johnnyfarrane.github.io/JF-brand/" target="_blank" class="btn">View Project</a>
                    </div>
                </div>

                <div class="project-card">
                    <div class="project-img">
                        <img src="photos/1.jpeg" alt="Zghaib Paints">
                    </div>
                    <div class="project-info">
                        <h3>Zghaib Paints</h3>
                        <p>Modern e-commerce showcase.</p>
                        <a href="https://johnnyfarrane.github.io/zghaib-paints/" target="_blank" class="btn">View Project</a>
                    </div>
                </div>

                <div class="project-card">
                    <div class="project-img">
                        <img src="photos/spotifylogo.jpg" alt="Spotify Clone">
                    </div>
                    <div class="project-info">
                        <h3>Spotify Clone</h3>
                        <p>Spotify project.</p>
                        <a href="https://johnnyfarrane.github.io/spotify/" target="_blank" class="btn">View Project</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
