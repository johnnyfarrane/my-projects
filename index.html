<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny El Farrane | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="minimal-header">
        <div class="container header-container">
            <h1 class="logo-text">Johnny El Farrane</h1>
        </div>
    </header>

    <main>
        <section id="projects" class="projects">
            <div class="container">
                <div class="section-title reveal">
                    <h2>Projects</h2>
                    <div class="underline"></div>
                </div>
                
                <div class="projects-grid">
                    <!-- Project 1: JF brand -->
                    <div class="project-card reveal">
                        <div class="project-img">
                            <img src="photos/outfit1.jpg" alt="JF brand">
                        </div>
                        <div class="project-info">
                            <h3>JF brand</h3>
                            <p>Premium branding.</p>
                            <a href="https://johnnyfarrane.github.io/JF-brand/" target="_blank" class="btn btn-outline">View Project</a>
                        </div>
                    </div>

                    <!-- Project 2: Zghaib Paints -->
                    <div class="project-card reveal">
                        <div class="project-img">
                            <img src="photos/1.jpeg" alt="Zghaib Paints">
                        </div>
                        <div class="project-info">
                            <h3>Zghaib Paints</h3>
                            <p>Modern e-commerce showcase.</p>
                            <a href="https://johnnyfarrane.github.io/zghaib-paints/" target="_blank" class="btn btn-outline">View Project</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
